site_name: WeChatRSS Documentation
theme:
  name: material
  palette:
    primary: indigo
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Overview: index.md
  - Installation: installation.md
  - Authentication: authentication.md
  - Scraping & MS Teams: scraping.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
